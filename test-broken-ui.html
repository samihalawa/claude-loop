<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Test UI - Claude Loop Debug</title>
    <style>
        /* Improved styling */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 2rem;
            text-align: center;
            font-size: 2.5rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #555;
        }
        
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }
        
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .button-group {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }
        
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 120px;
        }
        
        button[type="submit"] {
            background: #667eea;
            color: white;
        }
        
        button[type="submit"]:hover {
            background: #5a6fd8;
            transform: translateY(-2px);
        }
        
        .test-button {
            background: #48bb78;
            color: white;
        }
        
        .test-button:hover {
            background: #38a169;
            transform: translateY(-2px);
        }
        
        .nav-button {
            background: #ed8936;
            color: white;
        }
        
        .nav-button:hover {
            background: #dd7724;
            transform: translateY(-2px);
        }
        
        .load-button {
            background: #9f7aea;
            color: white;
        }
        
        .load-button:hover {
            background: #8b5cf6;
            transform: translateY(-2px);
        }
        
        #output {
            margin-top: 2rem;
            padding: 1.5rem;
            background: #f7fafc;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            min-height: 100px;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
        }
        
        .success {
            color: #38a169;
            background: #f0fff4;
            border-left-color: #38a169;
        }
        
        .error {
            color: #e53e3e;
            background: #fffbfa;
            border-left-color: #e53e3e;
        }
        
        .info {
            color: #667eea;
            background: #f7faff;
            border-left-color: #667eea;
        }
        
        .loading {
            opacity: 0.7;
            position: relative;
        }
        
        .loading::after {
            content: '';
            position: absolute;
            top: 50%;
            right: 10px;
            width: 20px;
            height: 20px;
            border: 2px solid #667eea;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .status-indicator {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
        }
        
        .status-online {
            background: #f0fff4;
            color: #38a169;
            border: 1px solid #c6f6d5;
        }
        
        .status-offline {
            background: #fffbfa;
            color: #e53e3e;
            border: 1px solid #fed7d7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Fixed Test UI - Claude Loop Debug</h1>
        
        <!-- Fixed form with proper labels and event handling -->
        <form id="testForm" role="form" aria-label="Test form">
            <div class="form-group">
                <label for="textInput">Enter test text:</label>
                <input type="text" id="textInput" name="textInput" placeholder="Enter text here..." 
                       aria-describedby="textInputHelp" required>
                <small id="textInputHelp" class="form-text">This field is required for form submission.</small>
            </div>
            
            <div class="button-group">
                <button type="submit" aria-label="Submit form">Submit Form</button>
                <button type="button" class="test-button" onclick="testFunction()" aria-label="Test function">Test Function</button>
                <button type="button" class="load-button" onclick="loadData()" aria-label="Load data from API">Load Data</button>
                <button type="button" class="nav-button" onclick="navigate()" aria-label="Navigate to working page">Navigate</button>
            </div>
        </form>
        
        <div id="output" role="log" aria-live="polite" aria-label="Output console">
            Ready for input...
        </div>
        
        <div id="statusIndicator" class="status-indicator status-online">
            System Status: Online
        </div>
    </div>
    
    <script>
        // Global variables properly declared
        let outputElement = null;
        let formElement = null;
        let testData = { initialized: true };
        
        // Initialize when DOM is loaded
        document.addEventListener('DOMContentLoaded', function() {
            outputElement = document.getElementById('output');
            formElement = document.getElementById('testForm');
            
            // Add form submit event handler
            formElement.addEventListener('submit', handleFormSubmit);
            
            // Add keyboard navigation support
            document.addEventListener('keydown', handleKeyboard);
            
            updateOutput('Application initialized successfully!', 'success');
        });
        
        // Fixed function - no more undeclared variables
        function testFunction() {
            try {
                const testMessage = 'Test function executed successfully!';
                console.log(testMessage);
                updateOutput(testMessage, 'success');
                
                // Test some functionality
                const inputValue = document.getElementById('textInput').value;
                if (inputValue) {
                    updateOutput(`Input value: "${inputValue}"`, 'info');
                } else {
                    updateOutput('No input value provided', 'info');
                }
            } catch (error) {
                console.error('Error in test function:', error);
                updateOutput(`Error: ${error.message}`, 'error');
            }
        }
        
        // Proper form submit handler
        function handleFormSubmit(event) {
            event.preventDefault(); // Prevent page refresh
            
            const formData = new FormData(formElement);
            const textValue = formData.get('textInput');
            
            if (!textValue || textValue.trim() === '') {
                updateOutput('Please enter some text before submitting', 'error');
                return;
            }
            
            // Simulate form processing
            updateOutput('Processing form submission...', 'info');
            outputElement.classList.add('loading');
            
            setTimeout(() => {
                outputElement.classList.remove('loading');
                updateOutput(`Form submitted successfully!\nSubmitted text: "${textValue}"`, 'success');
            }, 1500);
        }
        
        // Fixed API call with proper error handling
        async function loadData() {
            try {
                updateOutput('Loading data from API...', 'info');
                outputElement.classList.add('loading');
                
                // Use a working API endpoint for demonstration
                const apiUrl = 'https://jsonplaceholder.typicode.com/posts/1';
                
                const response = await fetch(apiUrl, {
                    method: 'GET',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                outputElement.classList.remove('loading');
                
                updateOutput(`Data loaded successfully!\nTitle: ${data.title}\nBody: ${data.body.substring(0, 100)}...`, 'success');
                
            } catch (error) {
                outputElement.classList.remove('loading');
                console.error('API call failed:', error);
                updateOutput(`API call failed: ${error.message}`, 'error');
            }
        }
        
        // Fixed navigation - goes to a working page
        function navigate() {
            try {
                updateOutput('Navigation initiated...', 'info');
                // Navigate to the current directory index instead of non-existent page
                const currentUrl = window.location.href;
                const baseUrl = currentUrl.substring(0, currentUrl.lastIndexOf('/'));
                
                // For demo purposes, just show a message instead of actual navigation
                updateOutput(`Would navigate to: ${baseUrl}/\nNavigation prevented for demo purposes.`, 'info');
                
                // Uncomment the line below for actual navigation
                // window.location.href = baseUrl + '/';
                
            } catch (error) {
                console.error('Navigation error:', error);
                updateOutput(`Navigation error: ${error.message}`, 'error');
            }
        }
        
        // Utility function to update output with proper formatting
        function updateOutput(message, type = 'info') {
            if (!outputElement) return;
            
            const timestamp = new Date().toLocaleTimeString();
            const formattedMessage = `[${timestamp}] ${message}`;
            
            outputElement.textContent = formattedMessage;
            outputElement.className = `${type}`;
            
            // Update aria-live region for screen readers
            outputElement.setAttribute('aria-label', `${type}: ${message}`);
        }
        
        // Keyboard navigation support
        function handleKeyboard(event) {
            // Escape key clears output
            if (event.key === 'Escape') {
                updateOutput('Output cleared by user', 'info');
            }
            
            // Ctrl+Enter submits form
            if (event.ctrlKey && event.key === 'Enter') {
                event.preventDefault();
                formElement.dispatchEvent(new Event('submit'));
            }
        }
        
        // Monitor connection status
        function updateStatus() {
            const statusEl = document.getElementById('statusIndicator');
            if (navigator.onLine) {
                statusEl.className = 'status-indicator status-online';
                statusEl.textContent = 'System Status: Online';
            } else {
                statusEl.className = 'status-indicator status-offline';
                statusEl.textContent = 'System Status: Offline';
            }
        }
        
        // Listen for online/offline events
        window.addEventListener('online', updateStatus);
        window.addEventListener('offline', updateStatus);
        
        // Initialize status
        updateStatus();
    </script>
</body>
</html>
